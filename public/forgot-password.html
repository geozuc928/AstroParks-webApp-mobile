<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset your AstroParks.io password">
  <title>Forgot Password — AstroParks.io</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="page">
    <div class="card">

      <a href="/" class="logo" aria-label="AstroParks.io home">
        <span class="logo-star" aria-hidden="true">★</span>
        <span class="logo-text">Astro<span>Parks</span>.io</span>
      </a>

      <h1>Forgot your password?</h1>
      <p class="subtitle">Enter your email and we'll send you a reset link</p>

      <div id="alert" class="alert" role="alert" aria-live="polite"></div>

      <form id="forgotForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            autocapitalize="none"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          Send Reset Link
        </button>
      </form>

      <div class="link-row">
        <a href="/login.html" class="link">← Back to sign in</a>
      </div>

    </div>
  </div>

  <script src="/js/forgot-password.js"></script>
</body>
</html>
