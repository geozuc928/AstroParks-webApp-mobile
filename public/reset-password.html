<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Set a new password for your AstroParks.io account">
  <title>Reset Password — AstroParks.io</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="page">
    <div class="card">

      <a href="/" class="logo" aria-label="AstroParks.io home">
        <span class="logo-star" aria-hidden="true">★</span>
        <span class="logo-text">Astro<span>Parks</span>.io</span>
      </a>

      <h1>Set new password</h1>
      <p class="subtitle">Choose a strong password for your account</p>

      <div id="alert" class="alert" role="alert" aria-live="polite"></div>

      <form id="resetForm" novalidate>
        <div class="form-group">
          <label for="password">New Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="At least 8 characters"
            autocomplete="new-password"
            minlength="8"
            required
          >
          <p class="password-hint">Minimum 8 characters</p>
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm New Password</label>
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            placeholder="Repeat your new password"
            autocomplete="new-password"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          Reset Password
        </button>
      </form>

      <div class="link-row">
        <a href="/login.html" class="link">← Back to sign in</a>
      </div>

    </div>
  </div>

  <script>
    // Read token from URL and attach to form submission
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (!token) {
        document.querySelector('.subtitle').textContent = 'Invalid or expired reset link.';
        document.getElementById('resetForm').style.display = 'none';
        return;
      }

      const form = document.getElementById('resetForm');
      const alert = document.getElementById('alert');
      const submitBtn = document.getElementById('submitBtn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const confirm_password = document.getElementById('confirm_password').value;

        if (password !== confirm_password) {
          showAlert('error', 'Passwords do not match');
          return;
        }

        setLoading(true);

        try {
          const res = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password, confirm_password }),
          });
          const data = await res.json();

          if (!res.ok) {
            showAlert('error', data.error || 'Something went wrong');
          } else {
            showAlert('success', data.message + ' Redirecting to login…');
            form.style.display = 'none';
            setTimeout(() => { window.location.href = '/login.html'; }, 2500);
          }
        } catch {
          showAlert('error', 'Network error — please try again');
        } finally {
          setLoading(false);
        }
      });

      function showAlert(type, message) {
        alert.className = `alert alert-${type} show`;
        alert.textContent = message;
      }

      function setLoading(loading) {
        submitBtn.disabled = loading;
        submitBtn.innerHTML = loading
          ? '<span class="spinner"></span>Resetting…'
          : 'Reset Password';
      }
    })();
  </script>
</body>
</html>
