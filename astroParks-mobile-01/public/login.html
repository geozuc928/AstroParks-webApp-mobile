<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — AstroParks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <style>
    :root {
      --bg:           #0a1628;
      --bg-card:      #0f2044;
      --accent:       #4f8ef7;
      --accent-hover: #3a7ae8;
      --accent-glow:  rgba(79,142,247,0.25);
      --text:         #e8f0fe;
      --text-muted:   #7a9cc9;
      --input-bg:     #ffffff;
      --input-text:   #111827;
      --input-border: #d1d5db;
      --border:       #1e3a5f;
      --error:        #f87171;
      --error-bg:     rgba(248,113,113,0.12);
      --success:      #34d399;
      --success-bg:   rgba(52,211,153,0.12);
      --radius:       12px;
      --radius-sm:    8px;
      --shadow:       0 8px 32px rgba(0,0,0,0.4);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;-webkit-text-size-adjust:100%}
    body{
      font-family:'Inter',system-ui,sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100vh;line-height:1.5;overflow-x:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:
        radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.6) 0%,transparent 100%),
        radial-gradient(1px 1px at 25% 40%,rgba(255,255,255,.4) 0%,transparent 100%),
        radial-gradient(1.5px 1.5px at 50% 10%,rgba(255,255,255,.7) 0%,transparent 100%),
        radial-gradient(1px 1px at 70% 25%,rgba(255,255,255,.5) 0%,transparent 100%),
        radial-gradient(1px 1px at 85% 60%,rgba(255,255,255,.4) 0%,transparent 100%),
        radial-gradient(2px 2px at 35% 70%,rgba(255,255,255,.3) 0%,transparent 100%),
        radial-gradient(1px 1px at 60% 80%,rgba(255,255,255,.5) 0%,transparent 100%),
        radial-gradient(1.5px 1.5px at 90% 5%,rgba(255,255,255,.6) 0%,transparent 100%),
        radial-gradient(1px 1px at 5% 85%,rgba(255,255,255,.4) 0%,transparent 100%),
        radial-gradient(1px 1px at 45% 55%,rgba(255,255,255,.35) 0%,transparent 100%),
        radial-gradient(1px 1px at 78% 45%,rgba(255,255,255,.5) 0%,transparent 100%),
        radial-gradient(1px 1px at 20% 90%,rgba(255,255,255,.4) 0%,transparent 100%),
        radial-gradient(2px 2px at 65% 35%,rgba(255,255,255,.3) 0%,transparent 100%),
        radial-gradient(1px 1px at 15% 55%,rgba(255,255,255,.45) 0%,transparent 100%),
        radial-gradient(1px 1px at 95% 75%,rgba(255,255,255,.4) 0%,transparent 100%);
    }
    .page{
      position:relative;z-index:1;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:100vh;padding:24px 16px;
    }
    .card{
      background:var(--bg-card);border:1px solid var(--border);
      border-radius:var(--radius);box-shadow:var(--shadow);
      width:100%;max-width:420px;padding:32px 28px;
    }
    @media(min-width:480px){.card{padding:40px 36px;max-width:460px}}
    .logo{display:flex;align-items:center;gap:8px;margin-bottom:28px;text-decoration:none}
    .logo-star{font-size:28px;line-height:1;color:var(--accent);filter:drop-shadow(0 0 8px var(--accent-glow))}
    .logo-text{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.3px}
    .logo-text span{color:var(--accent)}
    .card h1{font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:-.3px}
    .subtitle{font-size:14px;color:var(--text-muted);margin-bottom:28px}
    .form-group{margin-bottom:18px}
    label{
      display:block;font-size:13px;font-weight:500;color:var(--text-muted);
      margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;
    }
    input[type=email],input[type=password]{
      width:100%;padding:12px 14px;
      background:var(--input-bg);color:var(--input-text);
      border:1.5px solid var(--input-border);border-radius:var(--radius-sm);
      font-family:inherit;font-size:15px;line-height:1.4;
      outline:none;-webkit-appearance:none;appearance:none;
      transition:border-color .2s,box-shadow .2s;
    }
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
    input::placeholder{color:#9ca3af}
    .btn{
      display:block;width:100%;padding:13px 20px;border:none;
      border-radius:var(--radius-sm);font-family:inherit;font-size:15px;
      font-weight:600;cursor:pointer;text-align:center;
      transition:background .2s,transform .2s,box-shadow .2s;
      -webkit-appearance:none;appearance:none;
    }
    .btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(79,142,247,.3)}
    .btn-primary:hover:not(:disabled){background:var(--accent-hover);box-shadow:0 4px 20px rgba(79,142,247,.5);transform:translateY(-1px)}
    .btn-primary:active:not(:disabled){transform:translateY(0)}
    .btn:disabled{opacity:.65;cursor:not-allowed}
    .alert{
      padding:12px 14px;border-radius:var(--radius-sm);
      font-size:14px;line-height:1.5;margin-bottom:20px;display:none;
    }
    .alert.show{display:block}
    .alert-error{background:var(--error-bg);color:var(--error);border:1px solid rgba(248,113,113,.3)}
    .alert-success{background:var(--success-bg);color:var(--success);border:1px solid rgba(52,211,153,.3)}
    .spinner{
      display:inline-block;width:16px;height:16px;
      border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
      border-radius:50%;animation:spin .7s linear infinite;
      vertical-align:middle;margin-right:6px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .link-row{
      display:flex;justify-content:center;align-items:center;
      margin-top:20px;font-size:13px;color:var(--text-muted);
    }
    .link-row a{color:var(--accent);text-decoration:none;font-weight:500}
    .link-row a:hover{text-decoration:underline}
  </style>
</head>
<body>
<div class="page">
  <div class="card">
    <a href="/signup.html" class="logo" aria-label="AstroParks home">
      <span class="logo-star" aria-hidden="true">★</span>
      <span class="logo-text">Astro<span>Parks</span></span>
    </a>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your AstroParks account</p>

    <div id="alert" class="alert" role="alert" aria-live="polite"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email"
          placeholder="you@example.com"
          autocomplete="email" autocapitalize="none" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
          placeholder="Your password"
          autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">
        Sign In
      </button>
    </form>

    <div class="link-row">
      Don't have an account? <a href="/signup.html" style="margin-left:4px">Sign up</a>
    </div>
  </div>
</div>
<script>
(function(){
  'use strict';
  const form    = document.getElementById('loginForm');
  const alertEl = document.getElementById('alert');
  const btn     = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearAlert();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) return showAlert('error', 'Please fill in all fields');

    setLoading(true);
    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) return showAlert('error', data.error || 'Sign in failed');
      showAlert('success', `Welcome back, ${data.user.email}!`);
      form.reset();
    } catch {
      showAlert('error', 'Network error — check your connection and try again');
    } finally {
      setLoading(false);
    }
  });

  function showAlert(type, msg) {
    alertEl.className   = `alert alert-${type} show`;
    alertEl.textContent = msg;
    alertEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  function clearAlert() {
    alertEl.className   = 'alert';
    alertEl.textContent = '';
  }
  function setLoading(on) {
    btn.disabled  = on;
    btn.innerHTML = on ? '<span class="spinner"></span>Signing in\u2026' : 'Sign In';
  }
})();
</script>
</body>
</html>
