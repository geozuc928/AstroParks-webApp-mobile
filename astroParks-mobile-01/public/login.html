<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AstroParks — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      width: 100%;
      max-width: 460px;
      padding: 40px 36px 36px;
    }

    .card-title {
      font-size: 32px;
      font-weight: 700;
      color: #1a2f5c;
      text-align: center;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }

    .card-subtitle {
      font-size: 15px;
      color: #8a94a6;
      text-align: center;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #1a2f5c;
      margin-bottom: 7px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 13px 14px;
      font-family: inherit;
      font-size: 15px;
      color: #1a2f5c;
      background: #ffffff;
      border: 1.5px solid #dde1ea;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      -webkit-appearance: none;
    }

    input:focus {
      border-color: #3b6fd4;
      background: #eef3fd;
      box-shadow: 0 0 0 3px rgba(59, 111, 212, 0.12);
    }

    input::placeholder { color: #b0b8c9; }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      background: #1a3a6c;
      color: #ffffff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: background 0.15s, transform 0.1s;
      -webkit-appearance: none;
    }

    .btn:hover:not(:disabled) { background: #15305c; }
    .btn:active:not(:disabled) { transform: scale(0.99); }
    .btn:disabled { opacity: 0.65; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .msg {
      margin-top: 14px;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }
    .msg.error   { color: #d0302f; }
    .msg.success { color: #1e7e34; }

    .switch-link {
      margin-top: 24px;
      text-align: center;
      font-size: 14px;
      color: #8a94a6;
    }
    .switch-link a {
      color: #3b6fd4;
      font-weight: 600;
      text-decoration: none;
    }
    .switch-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">

  <h1 class="card-title">AstroParks</h1>
  <p class="card-subtitle">Customer Sign In</p>

  <form id="loginForm" novalidate>
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email"
        placeholder="you@example.com"
        autocomplete="email" autocapitalize="none" required>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
        placeholder="Your password"
        autocomplete="current-password" required>
    </div>

    <button type="submit" class="btn" id="submitBtn">Sign In</button>
  </form>

  <p class="msg" id="msg"></p>

  <div class="switch-link">
    Don't have an account? <a href="/signup.html">Sign up</a>
  </div>

</div>
<script>
(function () {
  'use strict';

  const form  = document.getElementById('loginForm');
  const msgEl = document.getElementById('msg');
  const btn   = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    setMsg('', '');

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password)
      return setMsg('error', 'Please fill in all fields');

    setLoading(true);
    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) return setMsg('error', data.error || 'Sign in failed');
      setMsg('success', `Welcome back! Signed in as ${data.user.email}`);
      form.reset();
    } catch {
      setMsg('error', 'Network error — check your connection and try again');
    } finally {
      setLoading(false);
    }
  });

  function setMsg(type, text) {
    msgEl.className   = type ? `msg ${type}` : 'msg';
    msgEl.textContent = text;
  }
  function setLoading(on) {
    btn.disabled  = on;
    btn.innerHTML = on ? '<span class="spinner"></span>Signing in…' : 'Sign In';
  }
})();
</script>
</body>
</html>
